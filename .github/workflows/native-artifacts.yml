name: CamJongUn Native Artifact Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "vendor/obs/**"
      - "native/**"
      - "crates/camjongun/src/platform/**"
      - ".github/workflows/native-artifacts.yml"

jobs:
  windows-directshow:
    name: Windows DirectShow native artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Windows adapter contract
        run: cargo test -p camjongun --test upstream_contract

      - name: Build Windows DirectShow native package
        shell: pwsh
        run: |
          $env:CAMJONGUN_BUILD_X86 = "1"
          .\scripts\native-windows-package.ps1

      - name: Upload Windows native package
        uses: actions/upload-artifact@v4
        with:
          name: camjongun-native-windows
          path: artifacts/native/windows/**

  macos-camera-extension:
    name: macOS native support package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate macOS adapter contract
        run: cargo test -p camjongun --test upstream_contract

      - name: Build macOS native support package
        run: bash scripts/native-macos-package.sh

      - name: Upload macOS native support package
        uses: actions/upload-artifact@v4
        with:
          name: camjongun-native-macos
          path: artifacts/native/macos/**

  linux-v4l2:
    name: Linux V4L2 native package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Linux adapter contract
        run: cargo test -p camjongun --test upstream_contract

      - name: Build Linux native package
        run: bash scripts/native-linux-package.sh

      - name: Upload Linux native package
        uses: actions/upload-artifact@v4
        with:
          name: camjongun-native-linux
          path: artifacts/native/linux/**
